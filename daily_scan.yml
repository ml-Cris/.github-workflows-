name: Daily Dcard Scraper

on:
  schedule:
    - cron: '0 0 * * *' # 每天國際標準時間 00:00 (台灣時間 08:00) 執行
  workflow_dispatch: # 也可以手動點擊執行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 檢出代碼
        uses: actions/checkout@v3

      - name: 設定 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安裝套件
        run: pip install requests pandas

      - name: 執行爬蟲
        run: python scraper.py

      - name: 提交並推送更新
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add dcard_data.csv
          git commit -m "Auto update Dcard data" || exit 0
          git push
